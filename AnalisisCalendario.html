<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendario Operativo | CapaSuite</title>
    <link rel="icon" type="image/png" href="Imagen/Icono_CapaSuite.png">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Libraries -->
    <script src="js/xlsx.full.min.js"></script>
    <script src="js/storage.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="js/firebase-auth.js"></script>

    <style>
        :root {
            --primary: #6366f1;
            --secondary: #10b981;
            --accent: #f59e0b;
            --danger: #ef4444;
            --bg-deep: #0f172a;
            --bg-surface: #1e293b;
            --bg-glass: rgba(30, 41, 59, 0.7);
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
            --radius-lg: 20px;
            --radius-md: 12px;
            --shadow-premium: 0 10px 30px -5px rgba(0, 0, 0, 0.3);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-deep);
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(16, 185, 129, 0.05) 0px, transparent 50%);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        /* NAVIGATION (Shared) */
        .top-nav {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            padding: 0 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 2000;
            height: 60px;
            border-bottom: 1px solid var(--border);
        }

        .nav-links { display: flex; gap: 20px; height: 100%; align-items: center; }
        .top-nav a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 0 12px;
            height: 100%;
            display: flex;
            align-items: center;
            transition: var(--transition);
            border-bottom: 3px solid transparent;
        }
        .top-nav a:hover { color: white; }
        .top-nav a.active { color: var(--primary); border-bottom-color: var(--primary); }

        /* HEADER */
        .page-header {
            padding: 40px 40px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1700px;
            margin: 0 auto;
        }

        .header-title h1 {
            font-size: 2.2rem;
            font-weight: 800;
            margin: 0;
            background: linear-gradient(135deg, #fff 0%, #94a3b8 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* CONTROLS */
        .controls-bar {
            display: flex;
            gap: 12px;
            background: var(--bg-glass);
            padding: 10px;
            border-radius: var(--radius-md);
            border: 1px solid var(--border);
            backdrop-filter: blur(10px);
        }

        select {
            background: #2d3a4f;
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            border: 1px solid var(--border);
            font-family: inherit;
            font-weight: 600;
            font-size: 0.85rem;
            outline: none;
            cursor: pointer;
            transition: var(--transition);
        }
        select:hover { border-color: var(--primary); }

        /* CALENDAR GRID */
        /* CALENDAR LAYOUT */
        .calendar-container {
            max-width: 1700px;
            margin: 0 auto;
            padding: 20px 40px 60px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 30px;
        }

        .month-card {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: var(--radius-lg);
            padding: 24px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            transition: var(--transition);
        }

        .month-title {
            font-size: 1.25rem;
            font-weight: 800;
            color: #1e293b;
            margin-bottom: 20px;
            padding-left: 10px;
            border-left: 4px solid var(--primary);
        }

        .days-header {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            margin-bottom: 15px;
            text-align: center;
        }

        .day-label {
            font-size: 0.7rem;
            font-weight: 800;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .days-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
        }

        .day-cell.empty { background: transparent !important; border: none !important; cursor: default; }

        /* DAY CELL (Apple/Google Style) */
        .day-cell {
            aspect-ratio: 1/1;
            background: #ffffff;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            padding: 2px 4px; /* More compact */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            color: #1e293b;
            box-shadow: 0 1px 2px rgba(0,0,0,0.03);
            overflow: hidden;
        }

        .day-cell:hover {
            transform: translateY(-2px);
            z-index: 50;
            box-shadow: 0 12px 20px -10px rgba(0, 0, 0, 0.15);
            border-color: var(--primary);
        }

        .day-num { 
            font-size: 0.7rem; 
            font-weight: 700; 
            color: #64748b;
            margin-top: 2px;
            margin-left: 2px;
        }
        
        /* OTB BADGE (Floating Card Style) */
        .otb-badge {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(4px);
            border: 1px solid #f1f5f9;
            padding: 2px 4px;
            border-radius: 4px;
            font-size: 0.55rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            pointer-events: none;
            width: 100%;
            margin-bottom: 2px;
        }
        .otb-val { color: #4f46e5; font-weight: 800; }
        
        .p-up { background: #dcfce7; color: #10b981; padding: 1px 4px; border-radius: 3px; font-weight: 800; font-size: 0.5rem; margin-top: 1px; }
        .p-down { background: #fee2e2; color: #ef4444; padding: 1px 4px; border-radius: 3px; font-weight: 800; font-size: 0.5rem; margin-top: 1px; }
        .p-equal { background: #f1f5f9; color: #94a3b8; padding: 1px 4px; border-radius: 3px; font-weight: 800; font-size: 0.5rem; margin-top: 1px; }

        /* LEGEND */
        .calendar-legend {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.75rem;
            color: var(--text-muted);
            font-weight: 700;
        }
        .legend-boxes { display: flex; gap: 4px; }
        .legend-box { width: 12px; height: 12px; border-radius: 2px; }

        /* HEATMAP */
        .heat-1 { background-color: #e0f2fe !important; }
        .heat-2 { background-color: #bae6fd !important; }
        .heat-3 { background-color: #7dd3fc !important; }
        .heat-4 { background-color: #38bdf8 !important; }
        .heat-5 { background-color: #0284c7 !important; color: white !important; }

        .is-past { opacity: 0.3; filter: grayscale(1); }
        .is-weekend { color: #ef4444; }
        .is-full { border: 2px solid #ef4444 !important; }
        .has-event { border: 2px solid #22c55e !important; }

        /* TOOLTIP (Image match) */
        #tooltip {
            position: fixed;
            z-index: 9999;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 15px;
            pointer-events: none;
            display: none;
            min-width: 280px;
            border: 1px solid #e2e8f0;
            color: #334155;
        }
        .tt-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f1f5f9; padding-bottom: 6px; margin-bottom: 10px; }
        .tt-date { font-weight: 800; display: flex; align-items: center; gap: 4px; }
        .tt-mkt { font-size: 0.7rem; color: #94a3b8; font-weight: 600; }
        .tt-main-hotel { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .tt-hotel-info { font-weight: 800; color: #4f46e5; }
        .tt-comp-section { font-size: 0.75rem; border-top: 1px solid #f1f5f9; padding-top: 8px; }
        .tt-comp-row { display: flex; justify-content: space-between; margin-bottom: 3px; }
        .tt-sold { color: #ef4444; font-weight: 800; }

        /* SYNC INDICATOR */
        .sync-toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--primary);
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: 700;
            box-shadow: 0 10px 20px var(--primary-glow);
            z-index: 3000;
            display: none;
        }
    </style>
</head>

<body>

        <div class="nav-links">
            <a href="index.html">Inicio</a>

        </div>

        </div>

    <div id="syncToast" class="sync-toast">✨ Sincronizando...</div>

    <header class="page-header">
        <div class="header-title">
            <h1>Calendario Estratégico</h1>
        </div>
        <div class="controls-bar" style="align-items: center;">
            <div class="calendar-legend" style="margin-right:20px;">
                <span>Bajo</span>
                <div class="legend-boxes">
                    <div class="legend-box heat-1"></div>
                    <div class="legend-box heat-2"></div>
                    <div class="legend-box heat-3"></div>
                    <div class="legend-box heat-4"></div>
                    <div class="legend-box heat-5"></div>
                </div>
                <span>Alto</span>
            </div>
            <button class="btn" style="background:#4f46e5; padding:8px 15px;" onclick="document.getElementById('excelEvents').click()">+ Eventos</button>
            <input type="file" id="excelEvents" hidden accept=".xlsx, .xls">
            
            <div style="width:1px; height:24px; background:var(--border); margin:0 10px;"></div>
            
            <select id="hotelSelector" onchange="renderCalendar()">
                <option value="Guadiana" selected>Hotel Guadiana</option>
                <option value="Cumbria">Hotel Cumbria</option>
            </select>
            <select id="yearSelector" onchange="renderCalendar()">
                <option value="2025">2025</option>
                <option value="2026" selected>2026</option>
            </select>
            <select id="metricSelector" onchange="renderCalendar()">
                <option value="occupancy" selected>Ver Ocupación</option>
                <option value="price">Ver Precios</option>
            </select>
        </div>
    </header>

    <main id="calendarGrid" class="calendar-container"></main>

    <section class="event-sidebar">
        <h3 style="margin-top:0;">Eventos del Periodo</h3>
        <div id="eventList" style="display:flex; flex-wrap:wrap; gap:10px;"></div>
    </section>

    <div id="tooltip"></div>

    <script>
        let revenueData = {};
        let rawEvents = [];
        let db = {};

        window.onload = async () => {
            loadAllData();
            
            document.getElementById('excelEvents').onchange = (e) => handleExcel(e.target);

            window.addEventListener('capasuite-data-synced', () => {
                const toast = document.getElementById('syncToast');
                toast.style.display = 'block';
                setTimeout(() => { loadAllData(); toast.style.display = 'none'; }, 2000);
            });
        };

        function loadAllData() {
            // 1. Competitor Data
            const rawComp = CapaStorage.getItem('revenue_data_v2');
            if (rawComp) {
                const parsed = JSON.parse(rawComp);
                revenueData = {}; // Reset
                parsed.data.forEach(d => { revenueData[d.dateISO] = d; });
            }

            // 2. Production / OTB Data
            const rawProd = CapaStorage.getItem('hotel_manager_db_v2');
            if (rawProd) {
                db = JSON.parse(rawProd);
                enrichRevenueData();
            }

            // 3. Events
            const localEvents = CapaStorage.getItem('custom_events');
            if (localEvents) rawEvents = JSON.parse(localEvents);

            renderCalendar();
            renderEventList();
        }

        function enrichRevenueData() {
            Object.keys(revenueData).forEach(iso => {
                const d = revenueData[iso];
                const parts = iso.split('-');
                const year = parts[0];

                if (!d.occupancyData) d.occupancyData = {};

                ['Guadiana', 'Cumbria'].forEach(hName => {
                    const hKey = Object.keys(db).find(k => k.toLowerCase().includes(hName.toLowerCase()));
                    if (hKey && db[hKey][year]) {
                        const yearData = db[hKey][year];
                        let otb = 0, occ = 0, otb_prev = null;

                        if (yearData.daily_otb && yearData.daily_otb[iso]) {
                            const v = yearData.daily_otb[iso];
                            otb = (typeof v === 'object') ? (v.rooms || 0) : v;
                        }
                        if (yearData.daily && yearData.daily[iso]) {
                            occ = yearData.daily[iso].rooms || yearData.daily[iso];
                        }
                        // SNAPSHOT FOR PICK-UP
                        if (yearData.otb_prev && yearData.otb_prev.daily_otb && yearData.otb_prev.daily_otb[iso]) {
                            const vPrev = yearData.otb_prev.daily_otb[iso];
                            otb_prev = (typeof vPrev === 'object') ? (vPrev.rooms || 0) : vPrev;
                        }

                        d.occupancyData[hName] = { otb, occ, otb_prev };
                    }
                });
            });
        }

        function renderCalendar() {
            const container = document.getElementById('calendarGrid');
            container.innerHTML = '';

            const year = parseInt(document.getElementById('yearSelector').value);
            const hotel = document.getElementById('hotelSelector').value;
            const metric = document.getElementById('metricSelector').value;
            const capacity = (hotel === 'Cumbria' ? 59 : 108);

            // Calculate Scale for Heatmap
            let minVal = 9999, maxVal = 0;
            Object.values(revenueData).forEach(d => {
                if (new Date(d.dateISO).getFullYear() === year) {
                    let v = 0;
                    if (metric === 'price') {
                        v = (d.hotels[hotel] && d.hotels[hotel].price) ? d.hotels[hotel].price : 0;
                    } else {
                        const rooms = (d.occupancyData && d.occupancyData[hotel]) ? d.occupancyData[hotel].otb : 0;
                        v = (rooms / capacity) * 100;
                    }
                    if (v > 0) { minVal = Math.min(minVal, v); maxVal = Math.max(maxVal, v); }
                }
            });
            if (minVal > maxVal) { minVal = 0; maxVal = 100; }

            const months = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];

            for (let m = 0; m < 12; m++) {
                const card = document.createElement('div');
                card.className = 'month-card';
                card.innerHTML = `<div class="month-title">${months[m]}</div><div class="days-header">${['L', 'M', 'X', 'J', 'V', 'S', 'D'].map(l => `<div class="day-label">${l}</div>`).join('')}</div>`;
                
                const grid = document.createElement('div');
                grid.className = 'days-grid';

                const firstDay = new Date(year, m, 1);
                let startOffset = firstDay.getDay(); if (startOffset === 0) startOffset = 7;
                const daysInMonth = new Date(year, m + 1, 0).getDate();

                for (let i = 1; i < startOffset; i++) { grid.innerHTML += '<div class="day-cell empty"></div>'; }

                const today = new Date(); today.setHours(0,0,0,0);

                for (let d = 1; d <= daysInMonth; d++) {
                    const dateObj = new Date(year, m, d);
                    const iso = `${year}-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                    const dData = revenueData[iso] || {};
                    const hData = (dData.occupancyData && dData.occupancyData[hotel]) ? dData.occupancyData[hotel] : { otb: 0, occ: 0, otb_prev: null };
                    
                    const roomsSold = (hData.occ > 0) ? hData.occ : hData.otb;
                    const occPct = (roomsSold / capacity) * 100;
                    
                    let valText = "";
                    let heatmapVal = 0;
                    if (metric === 'price') {
                        const p = (dData.hotels && dData.hotels[hotel]) ? (dData.hotels[hotel].price || dData.hotels[hotel]) : 0;
                        valText = p > 0 ? `${Math.round(p)}€` : "";
                        heatmapVal = p;
                    } else {
                        valText = roomsSold > 0 ? `${Math.round(occPct)}%` : "";
                        heatmapVal = occPct;
                    }

                    const cell = document.createElement('div');
                    cell.className = 'day-cell';
                    if (dateObj < today) cell.classList.add('is-past');
                    if (dateObj.getDay() === 0 || dateObj.getDay() === 6) cell.classList.add('is-weekend');
                    if (occPct >= 98) cell.classList.add('is-full');

                    // Heatmap logic (Scale 1-5 like in image)
                    if (heatmapVal > 0) {
                        const range = maxVal - minVal;
                        const score = range > 0 ? (heatmapVal - minVal) / range : 0.5;
                        if (score >= 0.8) cell.classList.add('heat-5');
                        else if (score >= 0.6) cell.classList.add('heat-4');
                        else if (score >= 0.4) cell.classList.add('heat-3');
                        else if (score >= 0.2) cell.classList.add('heat-2');
                        else cell.classList.add('heat-1');
                    }

                    // Event Border (Image match)
                    const ev = rawEvents.find(e => iso >= e.start && iso <= e.end);
                    if (ev) cell.classList.add('has-event');

                    // OTB and Pickup logic
                    const otb = hData.otb || 0;
                    const prev = hData.otb_prev;
                    const diff = (prev !== null) ? (otb - prev) : null;
                    
                    let badgeHtml = "";
                    if (otb > 0) {
                        let diffHtml = "";
                        if (prev !== null) {
                            const numericDiff = otb - prev;
                            if (numericDiff > 0) diffHtml = `<span class="p-up">▲ ${numericDiff}</span>`;
                            else if (numericDiff < 0) diffHtml = `<span class="p-down">▼ ${Math.abs(numericDiff)}</span>`;
                            else diffHtml = `<span class="p-equal">= 0</span>`;
                        }
                        badgeHtml = `
                            <div class="otb-badge">
                                <span class="otb-val">${otb} OTB</span>
                                ${diffHtml}
                            </div>
                        `;
                    }

                    cell.innerHTML = `
                        <div class="day-num">${d}</div>
                        ${badgeHtml}
                    `;

                    cell.onmouseenter = (e) => showTooltip(e, iso, hData, dData, ev);
                    cell.onmouseleave = hideTooltip;

                    grid.appendChild(cell);
                }
                card.appendChild(grid);
                container.appendChild(card);
            }
        }

        function showTooltip(e, iso, hData, dData, ev) {
            const currentHotel = document.getElementById('hotelSelector').value;
            const cap = (currentHotel === 'Cumbria' ? 59 : 108);
            const t = document.getElementById('tooltip');
            
            const dateStr = new Date(iso).toLocaleDateString('es-ES', { year: 'numeric', month: '2-digit', day: '2-digit' }).replace(/\//g, '-');
            const mktPrice = dData.compAvg || '--';
            const hotelPrice = (dData.hotels && dData.hotels[currentHotel]) ? (dData.hotels[currentHotel].price || dData.hotels[currentHotel]) : 0;
            const roomsSold = (hData.occ > 0) ? hData.occ : hData.otb;
            const occPct = Math.round((roomsSold / cap) * 100);

            let html = `
                <div class="tt-header">
                    <div class="tt-date">📅 ${dateStr}</div>
                    <div class="tt-mkt">Mkt: ${mktPrice}€</div>
                </div>
                <div class="tt-main-hotel">
                    <div class="tt-hotel-info">🏢 ${currentHotel}</div>
                    <div class="tt-price-info">
                        <span class="tt-price">${hotelPrice > 0 ? hotelPrice + '€' : '--€'}</span>
                        <span class="tt-occ">Ocup: ${occPct}%</span>
                    </div>
                </div>
                <div class="tt-comp-section">
                    <span class="tt-comp-title">Competencia</span>
            `;

            if (dData.hotels) {
                // Sort by price and filter out the main hotel (already shown)
                const comps = Object.entries(dData.hotels)
                    .filter(([name]) => name !== currentHotel)
                    .sort((a,b) => {
                        const pA = (typeof a[1] === 'object') ? a[1].price : a[1];
                        const pB = (typeof b[1] === 'object') ? b[1].price : b[1];
                        return (pA || 0) - (pB || 0);
                    });

                comps.forEach(([name, val]) => {
                    const price = (typeof val === 'object') ? val.price : val;
                    const isSoldOut = (typeof val === 'object' && (val.soldOut === true || val.price === 0 || val.price === '0'));
                    const isCumbria = name.toLowerCase().includes('cumbria');
                    
                    html += `
                        <div class="tt-comp-row" style="${isCumbria ? 'color:#4f46e5;' : ''}">
                            <span class="tt-comp-name">${name}</span>
                            <span class="tt-comp-price ${isSoldOut ? 'tt-sold' : ''}">
                                ${isSoldOut ? 'SOLD' : (price ? price + '€' : '--€')}
                            </span>
                        </div>
                    `;
                });
            } else {
                html += `<div style="padding:10px; text-align:center; color:#94a3b8;">Sin datos de mercado</div>`;
            }

            if (ev) {
                html += `<div style="margin-top:10px; padding:8px; background:#f0f7ff; color:#312e81; border-radius:8px; font-size:0.7rem; border:1px solid #e0e7ff;"><b>📅 Evento:</b> ${ev.desc}</div>`;
            }

            html += `</div>`;

            t.innerHTML = html;
            t.style.display = 'block';
            
            // Adjust position
            let x = e.clientX + 20;
            let y = e.clientY + 20;
            if (x + 300 > window.innerWidth) x = e.clientX - 300;
            if (y + 400 > window.innerHeight) y = e.clientY - 400;
            
            t.style.left = x + 'px';
            t.style.top = y + 'px';
        }

        function hideTooltip() { document.getElementById('tooltip').style.display = 'none'; }

        function renderEventList() {
            const list = document.getElementById('eventList');
            list.innerHTML = rawEvents.map(e => `<div style="background:rgba(255,255,255,0.05); padding:8px 15px; border-radius:50px; font-size:0.7rem; border:1px solid var(--border);"><b>${e.desc}</b> (${e.start})</div>`).join('');
        }

        function handleExcel(input) {
            const file = input.files[0];
            const reader = new FileReader();
            reader.onload = (e) => {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const json = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { header: 1 });
                
                let added = 0;
                for (let i = 1; i < json.length; i++) {
                    const row = json[i];
                    if (row[0] && row[2]) {
                        rawEvents.push({ start: formatDate(row[0]), end: formatDate(row[1] || row[0]), desc: row[2] });
                        added++;
                    }
                }
                if (added > 0) {
                    CapaStorage.setItem('custom_events', JSON.stringify(rawEvents));
                    loadAllData();
                    alert(`Importados ${added} eventos.`);
                }
            };
            reader.readAsArrayBuffer(file);
        }

        function formatDate(val) {
            if (val instanceof Date) return val.toISOString().split('T')[0];
            if (typeof val === 'number') return new Date((val - 25569) * 86400 * 1000).toISOString().split('T')[0];
            return val;
        }

        auth.onAuthStateChanged(user => {
            if (user) document.getElementById('userEmailNav').innerText = user.email;
        });
    </script>
</body>

</html>
